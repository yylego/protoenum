syntax = "proto3";

package protoenumstatus;

option go_package = "github.com/yylego/protoenum/protos/protoenumstatus;protoenumstatus";
option java_multiple_files = true;
option java_package = "protoenumstatus";

// StatusEnum defines operation status values
// StatusEnum 定义操作状态
enum StatusEnum {
	UNKNOWN = 0;
	SUCCESS = 1;
	FAILURE = 2;
}
